<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد نقشه</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- نقشه - پس‌زمینه (iframe جدا) -->
<div id="map">
    <iframe id="mapFrame" src="/map-frame" style="width:100%;height:100%;border:none;"></iframe>
</div>

<!-- سرچ‌بار + انتخاب شهر روی نقشه -->
<div class="map-search-wrap">
    <div class="map-toolbar-row">
        <!-- باکس انتخاب شهر -->
        <div class="city-select-box" id="citySelectBox">
            <i class="fas fa-city city-select-icon"></i>
            <span class="city-select-label" id="citySelectLabel">همه شهرها</span>
            <i class="fas fa-chevron-down city-select-arrow"></i>
        </div>

        <!-- سرچ مشتری -->
        <div class="map-search-box">
            <i class="fas fa-search map-search-icon"></i>
            <input type="text" id="mapSearchInput" class="map-search-input"
                   placeholder="جستجوی مشتری..." autocomplete="off" dir="rtl">
            <button class="map-search-clear" id="mapSearchClear" style="display:none">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- دراپ‌داون لیست شهرها -->
    <div class="city-select-dropdown" id="citySelectDropdown">
        <div class="city-select-search">
            <i class="fas fa-search"></i>
            <input type="text" id="citySelectSearchInput"
                   placeholder="جستجوی شهر..." autocomplete="off" dir="rtl">
        </div>
        <div class="city-select-list" id="citySelectList"></div>
    </div>

    <!-- نتایج سرچ مشتری -->
    <div class="map-search-results" id="mapSearchResults"></div>
</div>

<!-- پنل -->
<div class="panel" id="visitorPanel">
    <div class="section-toolbar">
        <button class="section-btn active" data-section="visitors" data-tooltip="لیست ویزیتورها">
            <i class="fas fa-user-tie"></i>
        </button>
        <button class="section-btn" data-section="customers" data-tooltip="مشتری‌های ثبت‌شده">
            <i class="fas fa-users"></i>
        </button>
        <button class="section-btn" data-section="payments" data-tooltip="پرداخت‌ها">
            <i class="fas fa-money-bill-wave"></i>
        </button>
        <button class="section-btn" data-section="user-settings" data-tooltip="تنظیمات کاربران">
            <i class="fas fa-user-cog"></i>
        </button>
        <button class="section-btn" data-section="general-settings" data-tooltip="تنظیمات عمومی">
            <i class="fas fa-cog"></i>
        </button>
    </div>

    <div class="panel-header">
        <div class="panel-title">
            <i class="fas fa-user-tie" id="sectionIcon"></i>
            <span id="sectionTitle">فروشنده‌ها</span>
        </div>
        <div class="online-badge" id="onlineBadge">
            <span class="pulse-dot"></span>
            <span id="onlineCount">۰</span> آنلاین
        </div>
    </div>
    <div class="panel-search-wrap" id="panelSearchWrap" style="display:none">
        <div class="panel-search-box">
            <i class="fas fa-search panel-search-icon"></i>
            <input type="text" id="panelSearchInput" class="panel-search-input"
                   placeholder="جستجو..." autocomplete="off" dir="rtl">
            <button class="panel-search-clear" id="panelSearchClear" style="display:none">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>
    <div class="panel-list" id="visitorList">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
    </div>
</div>

<div class="photo-modal" id="photoModal">
    <div class="photo-modal-backdrop" id="photoModalBackdrop"></div>
    <div class="photo-modal-content">
        <div class="photo-modal-header">
            <div>
                <div class="photo-modal-name" id="photoModalName"></div>
                <div class="photo-modal-address" id="photoModalAddress"></div>
            </div>
            <button class="photo-modal-close" id="photoModalClose"><i class="fas fa-times"></i></button>
        </div>
        <div class="photo-modal-grid" id="photoModalGrid"></div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
